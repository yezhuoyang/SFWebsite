# SF Learning Platform — nginx reverse proxy configuration
# Add this as a location block inside your existing server block for alphata.org
#
# Example: include /var/www/sfwebsite/nginx.conf;

location /sf-learn/ {
    proxy_pass http://127.0.0.1:8100/;
    proxy_http_version 1.1;

    # WebSocket support (required for interactive Coq sessions)
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Standard proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Long timeouts for WebSocket and Coq compilation
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    # Increase body size for file saves
    client_max_body_size 10M;
}
