<!DOCTYPE html>
<html>
<head><title>jsCoq WA Backend Test</title></head>
<body>
<h2>jsCoq WASM Backend Test</h2>
<pre id="log" style="background:#111;color:#0f0;padding:16px;height:80vh;overflow:auto;font-size:13px;"></pre>
<script>
const log = document.getElementById('log');
function L(msg) { log.textContent += msg + '\n'; log.scrollTop = log.scrollHeight; console.log(msg); }

async function test() {
  L('=== jsCoq WASM Backend Test ===');

  // The WA worker is at /jscoq/dist/wacoq_worker.js
  // It resolves relative paths from its own URL:
  //   ../backend/wasm/wacoq_worker.bc
  //   ../../../node_modules/ocaml-wasm/bin/ocamlrun.wasm
  //   etc.

  const workerUrl = '/jscoq/dist/wacoq_worker.js';
  L('Creating worker: ' + workerUrl);
  const worker = new Worker(workerUrl);

  const events = [];

  worker.onmessage = (evt) => {
    const data = evt.data;
    const tag = Array.isArray(data) ? data[0] : '?';
    events.push(tag);

    if (tag === 'Feedback') return; // too noisy
    if (tag === 'Log') {
      L('  Log: ' + JSON.stringify(data[2]).substring(0, 100));
      return;
    }
    L('← ' + tag + ': ' + JSON.stringify(data).substring(0, 200));
  };

  worker.onerror = (e) => {
    L('WORKER ERROR: ' + e.message);
  };

  // Wait for Boot event
  L('\n--- Waiting for Boot ---');
  await new Promise((resolve) => {
    const origHandler = worker.onmessage;
    worker.onmessage = (evt) => {
      origHandler(evt);
      if (Array.isArray(evt.data) && evt.data[0] === 'Boot') {
        resolve();
      }
    };
  });
  L('Boot received!\n');

  // Send LoadPkg for init and ltac2
  const pkgBase = '/jscoq/coq-pkgs/';
  const packages = ['init', 'ltac2', 'coq-base', 'coq-collections', 'coq-arith', 'coq-reals', 'sf-PLF'];

  for (const pkg of packages) {
    const url = pkgBase + pkg + '.coq-pkg';
    L('--- LoadPkg: ' + url + ' ---');
    // LoadPkg is a DIRECTIVE (raw postMessage, not JSON-stringified)
    worker.postMessage(['LoadPkg', url]);
  }

  // Wait for LoadedPkg events
  let pkgCount = 0;
  await new Promise((resolve) => {
    const origHandler = worker.onmessage;
    worker.onmessage = (evt) => {
      origHandler(evt);
      if (Array.isArray(evt.data) && evt.data[0] === 'LoadedPkg') {
        pkgCount++;
        L('Package loaded (' + pkgCount + '/' + packages.length + ')');
        if (pkgCount >= packages.length) resolve();
      }
    };
    // Timeout after 30s
    setTimeout(() => { L('TIMEOUT waiting for packages'); resolve(); }, 30000);
  });
  L('All packages loaded!\n');

  // Send Init with lib_path (JSON-stringified for WA backend)
  // The WA worker's jscoq_options accepts: implicit_libs, coq_options, debug, lib_path
  // Every directory that contains .vo or .cma files needs an entry
  const lib_path = [
    // init
    [["Coq","Init"],["/lib"]],[["Coq","Bool"],["/lib"]],
    [["Coq","Unicode"],["/lib"]],[["Coq","btauto"],["/lib"]],
    [["Coq","ssr"],["/lib"]],[["Coq","ssrmatching"],["/lib"]],
    [["Coq","ltac"],["/lib"]],[["Coq","syntax"],["/lib"]],
    [["Coq","cc"],["/lib"]],[["Coq","firstorder"],["/lib"]],
    // ltac2
    [["Ltac2"],["/lib"]],[["Coq","ltac2"],["/lib"]],
    // coq-base
    [["Coq","Classes"],["/lib"]],[["Coq","Logic"],["/lib"]],
    [["Coq","Program"],["/lib"]],[["Coq","Relations"],["/lib"]],
    [["Coq","Setoids"],["/lib"]],[["Coq","Structures"],["/lib"]],
    [["Coq","extraction"],["/lib"]],[["Coq","funind"],["/lib"]],
    // coq-collections
    [["Coq","FSets"],["/lib"]],[["Coq","Lists"],["/lib"]],
    [["Coq","MSets"],["/lib"]],[["Coq","Sets"],["/lib"]],
    [["Coq","Sorting"],["/lib"]],[["Coq","Vectors"],["/lib"]],
    // coq-arith
    [["Coq","Arith"],["/lib"]],[["Coq","Array"],["/lib"]],
    [["Coq","NArith"],["/lib"]],[["Coq","Numbers"],["/lib"]],
    [["Coq","Numbers","Cyclic","Abstract"],["/lib"]],[["Coq","Numbers","Cyclic","Int31"],["/lib"]],
    [["Coq","Numbers","Cyclic","Int63"],["/lib"]],[["Coq","Numbers","Cyclic","ZModulo"],["/lib"]],
    [["Coq","Numbers","Integer","Abstract"],["/lib"]],[["Coq","Numbers","Integer","Binary"],["/lib"]],
    [["Coq","Numbers","Integer","NatPairs"],["/lib"]],[["Coq","Numbers","NatInt"],["/lib"]],
    [["Coq","Numbers","Natural","Abstract"],["/lib"]],[["Coq","Numbers","Natural","Binary"],["/lib"]],
    [["Coq","Numbers","Natural","Peano"],["/lib"]],[["Coq","PArith"],["/lib"]],
    [["Coq","QArith"],["/lib"]],[["Coq","Strings"],["/lib"]],
    [["Coq","Wellfounded"],["/lib"]],[["Coq","ZArith"],["/lib"]],
    [["Coq","omega"],["/lib"]],[["Coq","ring"],["/lib"]],
    [["Coq","setoid_ring"],["/lib"]],
    // coq-reals (includes Lia/micromega)
    [["Coq","Floats"],["/lib"]],[["Coq","Reals"],["/lib"]],
    [["Coq","Reals","Abstract"],["/lib"]],[["Coq","Reals","Cauchy"],["/lib"]],
    [["Coq","micromega"],["/lib"]],[["Coq","nsatz"],["/lib"]],
    // sf-PLF
    [["PLF"],["/lib"]]
  ];
  L('--- Init (with lib_path: ' + lib_path.length + ' entries) ---');
  worker.postMessage(JSON.stringify(['Init', { implicit_libs: true, lib_path: lib_path }]));

  // Wait a moment for CoqInfo
  await new Promise(r => setTimeout(r, 2000));

  // Send NewDoc (JSON-stringified)
  L('--- NewDoc ---');
  worker.postMessage(JSON.stringify(['NewDoc', { lib_init: ['Coq.Init.Prelude'] }]));

  // Wait for Ready
  L('\n--- Waiting for Ready ---');
  await new Promise((resolve) => {
    const origHandler = worker.onmessage;
    worker.onmessage = (evt) => {
      origHandler(evt);
      if (Array.isArray(evt.data) && evt.data[0] === 'Ready') {
        resolve();
      }
    };
    setTimeout(() => { L('TIMEOUT waiting for Ready'); resolve(); }, 30000);
  });

  // Test: Run Imp.v's imports one by one
  const impImports = [
    'Set Warnings "-notation-overridden".',
    'From Coq Require Import Bool.',
    'From Coq Require Import Init.Nat.',
    'From Coq Require Import Arith.',
    'From Coq Require Import EqNat. Import Nat.',
    'From Coq Require Import Lia.',
    'From Coq Require Import List. Import ListNotations.',
    'From Coq Require Import Strings.String.',
    'From PLF Require Import Maps.',
  ];

  let sid = 1;
  for (const stmt of impImports) {
    const newSid = sid + 1;
    L('\n--- Add [' + newSid + ']: ' + stmt + ' ---');
    worker.postMessage(JSON.stringify(['Add', sid, newSid, stmt, false]));

    // Wait for Added
    await new Promise(r => setTimeout(r, 500));

    L('--- Exec [' + newSid + '] ---');
    worker.postMessage(JSON.stringify(['Exec', newSid]));

    // Wait for Processed feedback
    await new Promise((resolve) => {
      const origHandler = worker.onmessage;
      const timeout = setTimeout(() => { L('  TIMEOUT waiting for Processed'); resolve(undefined); }, 15000);
      worker.onmessage = (evt) => {
        origHandler(evt);
        const data = evt.data;
        if (Array.isArray(data)) {
          if (data[0] === 'Feedback' && data[1]?.contents?.[0] === 'Processed') {
            clearTimeout(timeout);
            L('  Processed!');
            resolve(undefined);
          }
          if (data[0] === 'CoqExn') {
            clearTimeout(timeout);
            L('  ERROR: ' + JSON.stringify(data[1]).substring(0, 200));
            resolve(undefined);
          }
        }
      };
    });

    sid = newSid;
  }

  L('\n--- All Imp imports tested! ---');

  L('\n=== Done ===');
  L('Events received: ' + events.join(', '));
}

test().catch(e => L('ERROR: ' + e.message));
</script>
</body>
</html>
